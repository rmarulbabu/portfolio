<svg xmlns="portfolio" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0c0a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <linearGradient id="initials" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#00D4FF" stroke-width="0.5">
    <path d="M0 100 L400 100"/>
    <path d="M0 200 L400 200"/>
    <path d="M0 300 L400 300"/>
    <path d="M100 0 L100 400"/>
    <path d="M200 0 L200 400"/>
    <path d="M300 0 L300 400"/>
  </g>
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="200" y="225" font-family="Unbounded, Arial, sans-serif" font-size="90" font-weight="900"
        text-anchor="middle" fill="url(#initials)" filter="url(#glow)" letter-spacing="-4">AB</text>
  <text x="200" y="280" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="6"
        text-anchor="middle" fill="#A1A1AA">PORTRAIT · PLACEHOLDER</text>
</svg>